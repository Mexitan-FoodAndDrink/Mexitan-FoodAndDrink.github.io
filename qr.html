<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR — Mexitán Food & Drink</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    :root {
      --verde:        #1e9438;
      --verde-oscuro: #166a28;
      --naranja:      #e8521c;
      --blanco:       #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--verde);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      font-family: 'Barlow', sans-serif;
    }

    .card {
      background: var(--blanco);
      border-radius: 16px;
      padding: 2.2rem 2.4rem 1.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      max-width: 420px;
      width: 100%;
    }

    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .brand-header img {
      max-height: 90px;
      width: auto;
    }
    .brand-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--verde-oscuro);
      opacity: 0.7;
    }

    .qr-wrapper {
      position: relative;
      border: 3px solid var(--naranja);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }
    #qr-canvas {
      display: block;
      border-radius: 6px;
    }

    .url-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--verde-oscuro);
      text-align: center;
    }

    .actions {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.55rem 1.4rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--naranja); color: #fff; }
    .btn-secondary { background: var(--verde); color: #fff; }

    .hint {
      font-size: 0.72rem;
      color: #888;
      text-align: center;
      line-height: 1.5;
    }

    /* Layout específico para pantalla */
    .screen-layout {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    
    /* Contenedor oculto en pantalla, visible al imprimir */
    .print-layout {
      display: none;
    }

    /* Impresión: mostrar varios tamaños */
    @media print {
      body { background: #fff; padding: 10px; display: block; }
      .screen-layout { display: none !important; }
      .print-layout { 
        display: flex !important; 
        flex-wrap: wrap; 
        gap: 15px; 
        justify-content: space-evenly;
        align-items: flex-start;
      }
      .print-layout .card { 
        box-shadow: none; 
        border: 2px dashed #ccc; /* Línea de corte */
        page-break-inside: avoid;
        margin: 0;
      }
      .print-label {
        width: 100%;
        text-align: center;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 1rem;
        color: #555;
        margin-bottom: 5px;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>

<div class="screen-layout">
<div class="card" id="main-card">
  <div class="brand-header">
    <img src="logo-full.png" alt="Mexitán" />
    <span class="brand-sub">Mexico Pakistan · Food &amp; Drink</span>
  </div>

  <div class="qr-wrapper">
    <canvas id="qr-canvas"></canvas>
  </div>

  <div class="url-label">mexitan-foodanddrink.github.io</div>

  <div class="actions">
    <button class="btn btn-primary" onclick="downloadQR()">⬇ Descargar PNG</button>
    <button class="btn btn-secondary" onclick="window.print()">🖨 Imprimir</button>
  </div>

  <p class="hint">Escanea para ver el menú completo</p>
</div>
</div>

<div class="print-layout" id="print-layout">
  <!-- JavaScript inyectará aquí las diferentes tarjetas para imprimir -->
</div>

<!-- qrcode-generator: genera la matriz QR sin dependencias -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script>
  const QR_URL    = 'https://mexitan-foodanddrink.github.io/';
  const CELL      = 12;   // píxeles por módulo
  const MARGIN    = 4;    // módulos de margen blanco (estándar)
  const LOGO_FRAC = 0.24; // el logo ocupa el 24% del ancho del QR

  // Colores de marca
  const COLOR_DARK = '#166a28'; // verde-oscuro para los módulos oscuros
  const COLOR_LIGHT = '#ffffff';

  function buildQR() {
    // Nivel H = 30% corrección de error, necesario para cubrir con logo
    const qr = qrcode(0, 'H');
    qr.addData(QR_URL);
    qr.make();
    return qr;
  }

  function drawQR(qr, ctx, canvasSize, moduleCount) {
    const offset = MARGIN * CELL;

    // Fondo blanco
    ctx.fillStyle = COLOR_LIGHT;
    ctx.fillRect(0, 0, canvasSize, canvasSize);

    // Módulos
    for (let row = 0; row < moduleCount; row++) {
      for (let col = 0; col < moduleCount; col++) {
        ctx.fillStyle = qr.isDark(row, col) ? COLOR_DARK : COLOR_LIGHT;
        ctx.fillRect(offset + col * CELL, offset + row * CELL, CELL, CELL);
      }
    }
  }

  function drawLogo(ctx, canvasSize, logoImg) {
    const logoSize  = Math.round(canvasSize * LOGO_FRAC);
    const pad       = 8; // padding blanco alrededor del logo
    const totalSize = logoSize + pad * 2;
    const x         = (canvasSize - totalSize) / 2;
    const y         = (canvasSize - totalSize) / 2;

    // Fondo blanco con borde redondeado
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.10)';
    ctx.shadowBlur  = 6;
    roundRect(ctx, x, y, totalSize, totalSize, 8);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.restore();

    // Logo
    ctx.drawImage(logoImg, x + pad, y + pad, logoSize, logoSize);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  function init() {
    const qr          = buildQR();
    const moduleCount = qr.getModuleCount();
    const canvasSize  = (moduleCount + MARGIN * 2) * CELL;

    const canvas = document.getElementById('qr-canvas');
    canvas.width  = canvasSize;
    canvas.height = canvasSize;
    const ctx = canvas.getContext('2d');

    drawQR(qr, ctx, canvasSize, moduleCount);

    const logo = new Image();
    logo.onload  = () => {
      drawLogo(ctx, canvasSize, logo);
      preparePrintLayout();
    };
    logo.onerror = () => {
      preparePrintLayout(); // Prepara de todos modos si falla
    };
    logo.src = 'logo-full.png';
  }

  function preparePrintLayout() {
    const mainCard = document.getElementById('main-card');
    const printLayout = document.getElementById('print-layout');
    const canvas = document.getElementById('qr-canvas');
    if (!mainCard || !printLayout || !canvas) return;

    const qrDataUrl = canvas.toDataURL('image/png');

    function createPrintCard(scale, labelText, padding, gap, subFontSize, urlFontSize) {
      const wrapper = document.createElement('div');
      wrapper.style.width = scale;

      const label = document.createElement('div');
      label.className = 'print-label';
      label.innerText = labelText;
      wrapper.appendChild(label);

      const clone = mainCard.cloneNode(true);
      clone.removeAttribute('id');

      // Eliminar botones y hint para no imprimirlos
      const actions = clone.querySelector('.actions');
      if (actions) actions.remove();
      const hint = clone.querySelector('.hint');
      if (hint) hint.remove();

      // Ajustar espaciados según el tamaño proporcionado
      clone.style.maxWidth = 'none';
      clone.style.width = '100%';
      clone.style.padding = padding;
      clone.style.gap = gap;
      clone.querySelector('.brand-sub').style.fontSize = subFontSize;
      clone.querySelector('.url-label').style.fontSize = urlFontSize;

      // Reemplazar <canvas> por <img> para que se imprima
      const oldCanvas = clone.querySelector('canvas');
      if (oldCanvas) {
        const newImg = document.createElement('img');
        newImg.src = qrDataUrl;
        newImg.style.width = '100%';
        newImg.style.height = 'auto';
        newImg.style.display = 'block';
        oldCanvas.parentNode.replaceChild(newImg, oldCanvas);
      }

      wrapper.appendChild(clone);
      return wrapper;
    }

    // Renderizamos tres tamaños distintos para imprimir
    printLayout.innerHTML = '';
    
    // 1x Pared (Grande) - Ocupa toda la fila (~98%)
    printLayout.appendChild(createPrintCard('98%', 'TAMAÑO PARED / CAJA', '2.2rem', '1.2rem', '0.72rem', '0.95rem'));
    
    // 2x Mesa (Mediano) - 2 por fila (~48%)
    printLayout.appendChild(createPrintCard('48%', 'TAMAÑO MESA', '1.5rem', '0.8rem', '0.60rem', '0.85rem'));
    printLayout.appendChild(createPrintCard('48%', 'TAMAÑO MESA', '1.5rem', '0.8rem', '0.60rem', '0.85rem'));

    // 3x Menú (Pequeño) - 3 por fila (~31%)
    printLayout.appendChild(createPrintCard('31%', 'TAMAÑO MENÚ FÍSICO', '1rem', '0.5rem', '0.45rem', '0.70rem'));
    printLayout.appendChild(createPrintCard('31%', 'TAMAÑO MENÚ FÍSICO', '1rem', '0.5rem', '0.45rem', '0.70rem'));
    printLayout.appendChild(createPrintCard('31%', 'TAMAÑO MENÚ FÍSICO', '1rem', '0.5rem', '0.45rem', '0.70rem'));
  }

  function downloadQR() {
    const canvas = document.getElementById('qr-canvas');
    const link   = document.createElement('a');
    link.download = 'mexitan-qr.png';
    link.href     = canvas.toDataURL('image/png');
    link.click();
  }

  init();
</script>
</body>
</html>

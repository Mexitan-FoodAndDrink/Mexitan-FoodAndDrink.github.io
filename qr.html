<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR — Mexitán Food & Drink</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    :root {
      --verde:        #1e9438;
      --verde-oscuro: #166a28;
      --naranja:      #e8521c;
      --blanco:       #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--verde);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      font-family: 'Barlow', sans-serif;
    }

    .card {
      background: var(--blanco);
      border-radius: 16px;
      padding: 2.2rem 2.4rem 1.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      max-width: 420px;
      width: 100%;
    }

    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .brand-header img {
      max-height: 90px;
      width: auto;
    }
    .brand-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--verde-oscuro);
      opacity: 0.7;
    }

    .qr-wrapper {
      position: relative;
      border: 3px solid var(--naranja);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }
    #qr-canvas {
      display: block;
      border-radius: 6px;
    }

    .url-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--verde-oscuro);
      text-align: center;
    }

    .actions {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.55rem 1.4rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--naranja); color: #fff; }
    .btn-secondary { background: var(--verde); color: #fff; }

    .hint {
      font-size: 0.72rem;
      color: #888;
      text-align: center;
      line-height: 1.5;
    }

    /* Impresión: ocultar todo excepto la tarjeta */
    @media print {
      body { background: #fff; padding: 0; }
      .actions, .hint { display: none; }
      .card { box-shadow: none; border: none; }
    }
  </style>
</head>

    const offset = MARGIN * CELL;

    ctx.fillRect(0, 0, canvasSize, canvasSize);

    // Módulos
    for (let row = 0; row < moduleCount; row++) {

    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
